# Recurring Solid Queue tasks. Each entry delegates to a thin job wrapping a
# service (guides/backend-guide.md).

development:
  step_runs_sweep:
    class: StepRuns::SweepJob
    schedule: every 30 seconds

production:
  step_runs_sweep:
    class: StepRuns::SweepJob
    schedule: every 30 seconds
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
